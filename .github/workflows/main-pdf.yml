name: Docs to PDF

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**.md'
      - 'docs/images/**'
  workflow_dispatch:

jobs:
  convert-to-pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: docs
          output_dir: docs/pdf
          images_dir: docs/images
          image_import: ./images
          build_html: false

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: regenerate resume PDF"
          file_pattern: docs/pdf/*.pdf
