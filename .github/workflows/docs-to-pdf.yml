name: Generate PDFs and release

on:
  push:
    branches:
      - main
    paths:
      - 'docs/*.md'
  workflow_dispatch:

jobs:
  convert-to-pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Convert markdown to PDF
        run: |
          mkdir -p docs/pdf
          for f in docs/*.md; do
            base=$(basename "$f" .md)
            npx --yes md-to-pdf "$f"
            mv "${f%.md}.pdf" "docs/pdf/caleb-kopp-resume-${base}.pdf"
          done
          echo "Generated PDFs:"
          ls -lah docs/pdf/
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: "/usr/bin/google-chrome-stable"

      - name: Generate release tag
        id: tag
        run: |
          TAG="$(TZ="America/Chicago" date +"%y.%m.%d.%H%M")-pdf"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release and upload PDFs
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --latest \
            docs/pdf/*.pdf
        env:
          GH_TOKEN: ${{ secrets.RESUME_PAT }}