name: Docs to PDF

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**.md'
      - 'docs/images/**'
  workflow_dispatch:

jobs:
  convert-to-pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RESUME_PAT }}

      - name: Ensure output directory exists
        run: mkdir -p docs/pdf

      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: docs
          output_dir: docs/pdf
          images_dir: docs/images
          image_import: ./images
          build_html: false

      - name: Verify PDFs were generated
        run: |
          echo "Contents of docs/pdf:"
          ls -lah docs/pdf/ || echo "Directory is empty or missing"

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pdf/*.pdf
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "ci: regenerate resume PDF"
          git push
        env:
          GH_TOKEN: ${{ secrets.RESUME_PAT }}

      - name: Generate release tag
        id: tag
        run: |
          TAG=$(TZ="America/Chicago" date +"%y.%m.%d.%H%M")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release and upload PDFs
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --latest \
            docs/pdf/*.pdf
        env:
          GH_TOKEN: ${{ secrets.RESUME_PAT }}
