name: zizmor

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  zizmor:
    name: Scan workflows
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@v1
        with:
          advanced-security: true
