name: Bundle and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Release Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RESUME_PAT }}

      - name: Generate release tag
        id: tag
        run: |
          TAG="bundle-$(TZ="America/Chicago" date +"%y.%m.%d.%H%M")"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release and upload files
        run: |
          git pull --rebase
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --latest \
            lists/Brewfile \
            lists/vsc_install_list.sh
        env:
          GH_TOKEN: ${{ secrets.RESUME_PAT }}